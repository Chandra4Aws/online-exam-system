spring.application.name=online-exam-backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/online_exam_db
spring.datasource.username=postgres
spring.datasource.password=Mouli@1504
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security (JWT Secret - Todo: Move to env variable)
jwt.secret=your_super_secret_key_which_should_be_long_enough_for_hs256_algorithm
jwt.expiration=86400000

# Multipart file upload limits (for proctoring recordings)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Proctoring recordings storage path (relative to where the JAR runs)
recordings.storage.path=c:/Users/kammchan/.gemini/antigravity/scratch/online-exam-system/backend/recordings
